    # Explicit reproduction convention; preserves matrix row order.
    asset_row_order_policy: "appendix_order"
    
    # Explicit in manuscript.
    excluded_dates:
      - "2014-12-24"
      - "2014-11-28"
      - "2014-07-03"
      
    # Explicit in manuscript; treat as a validation invariant.
    N_days_expected_after_filters: 248
    
    # Explicitly implied by discarding first 10 minutes.
    session_start_inclusive: "09:40:00"
    
    # Explicit in manuscript discussion of closing-imbalance dissemination.
    session_end_exclusive: "15:45:00"
    
    # Explicit in manuscript.
    discard_open_minutes: 10
    
    # Explicit in manuscript.
    discard_close_minutes: 15
    
    # Unspecified in manuscript; rational placeholder for exchange-local clock.
    market_timezone: "America/New_York"
    
    # Explicit in manuscript.
    delta_t_seconds: 1
    
    # Derived from 09:40:00 inclusive to 15:45:00 exclusive; manuscript prints return-interval count, not timestamp count.
    price_grid_timestamps_per_day_expected: 21900
    
    # Explicit in manuscript.
    return_intervals_per_day_expected: 21899
    
    # Explicit in manuscript.
    T_total_return_intervals_expected: 5430952
    
    # Explicit in manuscript.
    overnight_returns_included: false
    
    # Derived from manuscript and required for exact dimensional consistency.
    T_day_interpretation: "counts 1-second return intervals, not midpoint timestamps"

  # ------------------------------------------------------------------------------
  # QUOTE CLEANING AND 1-SECOND SYNCHRONIZATION
  # ------------------------------------------------------------------------------
  quote_cleaning_and_synchronization:
    # Required operationally for deterministic within-second last-observation selection.
    raw_row_order_field: "RAW_ROW_ORDER"
    
    # Unspecified in manuscript; rational placeholder. Do not alter without exact TAQ feed documentation.
    quote_feed_scope: "as_provided_in_taq_quote_file"
    
    # Unspecified in manuscript; rational placeholder. Keep all records in the provided quote feed unless feed scope is explicitly frozen otherwise.
    primary_exchange_filter: null
    
    # Unspecified in manuscript; rational placeholder assuming regular, firm quotes only. Must be reconciled to the exact 2014 TAQ codebook.
    quote_condition_keep_codes:
      - "R"
      
    # Unspecified in manuscript; rational robustification placeholder.
    require_bid_gt_zero: true
    
    # Unspecified in manuscript; rational robustification placeholder.
    require_ask_gt_zero: true
    
    # Unspecified in manuscript; rational robustification placeholder.
    require_bidsiz_gt_zero: true
    
    # Unspecified in manuscript; rational robustification placeholder.
    require_asksiz_gt_zero: true
    
    # Unspecified in manuscript; rational robustification placeholder. Implements drop of locked/crossed quotes via ASK > BID.
    require_ask_gt_bid: true
    
    # Required by the manuscript’s “last available midpoint price in each second t”.
    second_bucket_rule: "floor_to_second"
    
    # Explicitly implied by manuscript.
    within_second_quote_selector: "last_valid_quote"
    
    # Explicit in manuscript.
    missing_second_fill_method: "last_observation_carried_forward"
    
    # Explicitly implied by manuscript.
    carry_forward_within_day_only: true
    
    # Explicit in manuscript.
    carry_across_overnight: false
    
    # Unspecified in manuscript; rational placeholder.
    first_retained_second_initialization: "carry_forward_last_same_day_midpoint_before_session_start"
    
    # Explicit in manuscript Eq. (12).
    midpoint_formula: "m_k(t) = (a_k(t) + b_k(t)) / 2"

  # ------------------------------------------------------------------------------
  # RETURN CONSTRUCTION AND STANDARDIZATION
  # ------------------------------------------------------------------------------
  return_construction_and_standardization:
    # Explicit in manuscript.
    log_return_horizon_seconds: 1
    
    # Explicit in manuscript.
    return_computation_scope: "within_day_only"
    
    # Explicit in manuscript Eq. (13).
    log_return_formula: "G_k(t, Δt) = ln(m_k(t+Δt)) - ln(m_k(t))"
    
    # Explicitly implied by manuscript.
    standardization_scope: "full_retained_2014_intraday_sample"
    
    # Explicitly implied by Eq. (14).
    mean_estimator: "full_sample_mean_per_stock"
    
    # Explicitly implied by Eq. (14).
    variance_estimator: "full_sample_variance_per_stock"
    
    # Unspecified in manuscript; rational placeholder chosen for consistency with C = (1/T)MM^†.
    variance_denominator: "T"
    
    # Explicit in manuscript Eq. (14).
    normalization_formula: "M_k(t) = (G_k(t) - <G_k(t)>_t) / σ_k"

  # ------------------------------------------------------------------------------
  # SPECTRAL DECOMPOSITION AND WHITENING
  # ------------------------------------------------------------------------------
  spectral_decomposition:
    # Explicit in manuscript.
    correlation_measure: "Pearson"
    
    # Explicitly implied by manuscript.
    correlation_estimation_window: "full_retained_2014_intraday_sample"
    
    # Explicit in manuscript Eq. (19).
    correlation_formula: "C = (1/T) M M^†"
    
    # Correct mathematical property of Pearson C.
    matrix_property_requirement: "symmetric_positive_semidefinite"
    
    # Explicitly stated in manuscript for their sample.
    empirical_expectation_for_this_dataset: "positive_definite"
    
    # Unspecified in manuscript; rational placeholder.
    eigensolver_class: "dense_symmetric_eigendecomposition"
    
    # Explicitly required to identify market/sector modes in the manuscript.
    eigenvalue_sort_order: "descending"
    
    # Explicitly implied by R = Λ^{-1/2} U^† M over all K modes.
    retain_all_modes_for_whitening: true
    
    # Explicit in manuscript.
    whitening_square_root_branch: "positive"
    
    # Explicit in manuscript Eq. (21).
    whitening_formula: "R = Λ^{-1/2} U^† M"
    
    # Explicit in manuscript.
    top_modes_analyzed:
      - 1
      - 2
      - 3
      - 4
      - 5
      
    # Unspecified in manuscript; rational placeholder.
    eigenvector_sign_rule_for_plots: "deterministic_sign_flip_for_visual_consistency_only"
    
    # Explicitly implied by figure description.
    plot_stock_ordering_for_eigenvectors: "GICS_sector_order"

  # ------------------------------------------------------------------------------
  # STATIC EXTREME VALUE ANALYSIS
  # ------------------------------------------------------------------------------
  static_evt:
    # Explicitly implied by manuscript.
    positive_tail_series: "R_k"
    
    # Explicitly implied by manuscript’s negative-tail treatment.
    negative_tail_series: "-R_k"
    
    # Explicit in manuscript’s main POT results (“without declustering extreme values”).
    declustering_before_gpd_fit: false
    
    # Unspecified in manuscript; rational placeholder spanning the range shown in the figures.
    tail_quantile_grid_alpha:
      - 0.1
      - 0.05
      - 0.02
      - 0.01
      - 0.005
      - 0.002
      - 0.001
      - 0.0005
      - 0.0002
      - 0.0001
      
    # Unspecified in manuscript; rational placeholder matching common NumPy/pandas/R default behavior.
    quantile_interpolation_method: "type_7_linear"
    
    # Unspecified in manuscript; rational placeholder for Q-Q and NRMSD calculations.
    empirical_cdf_plotting_position: "i/(n+1)"
    
    # Explicit in manuscript.
    gpd_estimation_method: "maximum_likelihood"
    
    # Unspecified in manuscript; rational placeholder.
    gpd_optimizer: "L-BFGS-B"
    
    # Unspecified in manuscript; rational placeholder to enforce sigma > 0.
    gpd_sigma_parameterization: "sigma = exp(eta)"
    
    # Required by GPD support constraint.
    gpd_support_enforcement: "require 1 + gamma * x_i / sigma > 0 for all exceedances"
    
    # Unspecified in manuscript; rational placeholder.
    gpd_initial_gamma: 0.1
    
    # Unspecified in manuscript; rational placeholder.
    gpd_initial_sigma: "sample_mean_excess"
    
    # Unspecified in manuscript; rational placeholder.
    gpd_optimizer_maxiter: 10000
    
    # Unspecified in manuscript; rational placeholder.
    gpd_optimizer_ftol: 1.0e-08
    
    # Unspecified in manuscript; rational placeholder.
    gpd_optimizer_gtol: 1.0e-08
    
    # Explicit in manuscript Eq. (15).
    ferro_segers_tau_condition: 2
    
    # Explicit in manuscript Eq. (17).
    error_bar_calculation: "asymptotic_variance_from_fisher_information"
    
    # Explicit in manuscript Eq. (18).
    goodness_of_fit_metric: "NRMSD"
    
    # Explicit in manuscript appendix.
    qq_plot_enabled: true
    
    # Explicit in manuscript figure example.
    example_alpha_positive_tail: 0.005
    
    # Explicit in manuscript figure example.
    example_alpha_negative_tail: 0.005
    
    # Unspecified as an input in manuscript; empirical benchmark inferred from published figure.
    example_threshold_u_positive_benchmark: 4.38
    
    # Unspecified as an input in manuscript; empirical benchmark inferred from published figure.
    example_threshold_u_negative_benchmark: 4.59

  # ------------------------------------------------------------------------------
  # DYNAMIC ANALYSIS AND NON-STATIONARITY
  # ------------------------------------------------------------------------------
  dynamic_analysis:
    # Explicit in manuscript Eq. (24).
    intraday_profile_input_series: "|R_k|"
    
    # Explicit in manuscript.
    intraday_seasonality_period: "T_day_return_intervals"
    
    # Explicit in manuscript Eq. (24).
    intraday_profile_formula: "V_k(t_intra) = (1/N_days) * sum_d |R_k(d*T_day + t_intra)|"
    
    # Explicit in manuscript Eq. (25).
